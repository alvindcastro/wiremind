services:
  # Go API & Parser Service
  forensics:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8765:8765"
    environment:
      - DB_ENABLED=true
      - DB_HOST=postgres
      - DB_USER=postgres
      - DB_PASSWORD=wiremind_pass
      - DB_NAME=wiremind
      - REDIS_ENABLED=true
      - REDIS_HOST=redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./data:/root/data
      - ./output:/root/output
      - ./logs:/root/logs
    command: ["serve"]

  # Go Background Worker
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - DB_ENABLED=true
      - DB_HOST=postgres
      - DB_USER=postgres
      - DB_PASSWORD=wiremind_pass
      - DB_NAME=wiremind
      - REDIS_ENABLED=true
      - REDIS_HOST=redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./data:/root/data
      - ./logs:/root/logs
    command: ["worker"]

  # Python AI Agents
  agents:
    build:
      context: ./python
      dockerfile: Dockerfile
    environment:
      - WIREMIND_API_URL=http://forensics:8765
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    depends_on:
      - forensics

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=wiremind_pass
      - POSTGRES_DB=wiremind
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Redis Queue
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # --- Observability & Infrastructure Expansion ---

  # Prometheus Metrics
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9091:9090"
    volumes:
      - ./scripts/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  # Grafana Dashboards
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=wiremind_pass
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  # Jaeger Tracing (v2)
  jaeger:
    image: jaegertracing/jaeger:latest
    ports:
      - "16686:16686" # UI
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP

  # Standalone ChromaDB
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/data
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/data

  # n8n Workflow Automation
  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
    volumes:
      - n8n_data:/home/node/.n8n

  # Loki Log Aggregator
  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

  # Promtail Log Shipper
  promtail:
    image: grafana/promtail:latest
    volumes:
      - /var/log:/var/log
      - ./scripts/promtail.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  chroma_data:
  n8n_data:
