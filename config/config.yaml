output_dir: "./output"
log_level: "info"
tool_server_port: 8765
pcap:
  snapshot_len: 65535
  promiscuous: false
  timeout_ms: 30
geoip:
  city_db_path: "./data/GeoLite2-City.mmdb"
  asn_db_path: "./data/GeoLite2-ASN.mmdb"
ioc:
  sources:
    - path: "./data/ioc/feodo-tracker-ips.txt"
      source: "feodo-tracker"
      type: "ip"
      severity: "high"
    - path: "./data/ioc/abuse-ch-domains.txt"
      source: "abuse.ch"
      type: "domain"
      severity: "high"
threat_intel:
  cache_ttl_minutes: 1440 # 24 hours
  http_timeout_sec: 10
postgres:
  enabled: false
  host: "localhost"
  port: 5432
  user: "postgres"
  password: "password"
  dbname: "wiremind"
  ssl_mode: "disable"
redis:
  enabled: false
  host: "localhost"
  port: 6379
  password: ""
  db: 0
